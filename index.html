<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teammate Finder WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #131316);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c21);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #71717a);
            --button-color: var(--tg-theme-button-color, #5865f2);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --border-color: #2e2e38;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: 80px; /* Отступ для нижней панели меню */
        }

        /* Контейнер приложения */
        .app-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 22px;
            margin: 0 0 4px 0;
            font-weight: 800;
            background: linear-gradient(45deg, #5865f2, #9b5de5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--hint-color);
            margin: 0;
        }

        /* Экраны */
        .screen {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            animation: fadeIn 0.3s ease-in-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Элементы форм */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--button-color);
        }

        /* Карточка игрока (Экран Поиска) */
        .card-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .player-card {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            padding: 24px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #5865f2, #a855f7);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
        }

        .card-username {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 4px 0;
        }

        .card-displayname {
            font-size: 16px;
            color: var(--button-color);
            font-weight: 600;
            margin: 0 0 12px 0;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
        }

        .badge.primary {
            background-color: rgba(88, 101, 242, 0.15);
            border-color: var(--button-color);
            color: #8c96ff;
        }

        .card-about {
            font-size: 14px;
            color: var(--hint-color);
            line-height: 1.5;
            margin: 0;
            min-height: 42px;
        }

        /* Кнопки управления */
        .actions-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        button {
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-submit {
            background-color: var(--button-color);
            color: var(--button-text);
            width: 100%;
            margin-top: auto;
        }

        .btn-dislike {
            background-color: #f43f5e;
            color: white;
            flex: 1;
        }

        .btn-like {
            background-color: #10b981;
            color: white;
            flex: 1;
        }

        /* Заглушка, если анкет нет */
        .no-profiles {
            text-align: center;
            margin: auto;
        }

        /* Навигационная панель снизу (появляется после регистрации) */
        .nav-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            height: 65px;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            color: var(--hint-color);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .nav-item.active {
            color: var(--button-color);
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header">
            <h1>TEAMMATE MATCH</h1>
            <p id="headerSubtitle">Создай единый профиль для всех игр</p>
        </div>

        <div id="registrationScreen" class="screen active">
            <div class="form-group">
                <label for="regNickname">Придумай свой ник (один раз для всех игр)</label>
                <input type="text" id="regNickname" placeholder="Например: Killer_Gamer, Neo" maxlength="25">
            </div>

            <div style="border: 1px dashed var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 18px; background: rgba(88,101,242,0.05)">
                <p style="margin: 0 0 10px 0; font-size: 13px; color: var(--hint-color); font-weight: bold;">Настройка первой игры:</p>
                <div class="form-group">
                    <label for="gameSelect">Выберите игру</label>
                    <select id="gameSelect">
                        <option value="CS 2">Counter-Strike 2</option>
                        <option value="Dota 2">Dota 2</option>
                        <option value="Valorant">Valorant</option>
                        <option value="Apex Legends">Apex Legends</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="rankInput">Ваш текущий ранг в этой игре</label>
                    <input type="text" id="rankInput" placeholder="Калаш, Алмаз 2, 4500 MMR..." maxlength="30">
                </div>

                <div class="form-group">
                    <label for="voiceSelect">Наличие микрофона</label>
                    <select id="voiceSelect">
                        <option value="Да, Discord/ТГ">Да, Discord / ТГ 🎙️</option>
                        <option value="Только внутриигровой">Только внутри игры 🎧</option>
                        <option value="Без микрофона">Без микрофона 🚫</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="aboutInput">Описание стиля игры</label>
                    <textarea id="aboutInput" rows="3" placeholder="Расскажи, как ты играешь в эту игру..." maxlength="150"></textarea>
                </div>
            </div>

            <button class="btn-submit" onclick="submitRegistration()">Создать профиль и искать</button>
        </div>

        <div id="feedScreen" class="screen">
            <div class="card-wrapper">
                
                <div class="player-card" id="playerCard">
                    <div class="card-avatar">🎮</div>
                    <h2 class="card-username" id="cardUsername">@loading</h2>
                    <div class="card-displayname" id="cardDisplayName">Игрок</div>
                    
                    <div class="tags-container">
                        <span class="badge primary" id="cardGame">Игра</span>
                        <span class="badge" id="cardRank">Ранг</span>
                        <span class="badge" id="cardVoice">Связь</span>
                    </div>
                    
                    <p class="card-about" id="cardAbout">Загрузка информации...</p>
                </div>

                <div class="no-profiles" id="noProfiles" style="display: none;">
                    <span style="font-size: 40px;">✨</span>
                    <h3>Все анкеты просмотрены!</h3>
                    <p style="color: var(--hint-color); font-size: 14px;">Зайди позже или измени профиль в настройках.</p>
                </div>

            </div>

            <div class="actions-row" id="actionButtons">
                <button class="btn-dislike" onclick="handleSwipe('skip')">✖ Пропустить</button>
                <button class="btn-like" onclick="handleSwipe('like')">❤ Играть!</button>
            </div>
        </div>

        <div id="profileScreen" class="screen">
            <div class="form-group">
                <label for="editNickname">Ваш общий никнейм</label>
                <input type="text" id="editNickname" placeholder="Твой ник">
            </div>

            <div style="border: 1px solid var(--border-color); border-radius: 16px; padding: 16px; background-color: var(--secondary-bg);">
                <div class="form-group">
                    <label for="editGameSelect" style="color: var(--button-color); font-weight: bold;">Выберите игру для изменения данных</label>
                    <select id="editGameSelect">
                        <option value="CS 2">Counter-Strike 2</option>
                        <option value="Dota 2">Dota 2</option>
                        <option value="Valorant">Valorant</option>
                        <option value="Apex Legends">Apex Legends</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editRankInput">Ранг в выбранной игре</label>
                    <input type="text" id="editRankInput" placeholder="Укажи ранг">
                </div>

                <div class="form-group">
                    <label for="editVoiceSelect">Связь</label>
                    <select id="editVoiceSelect">
                        <option value="Да, Discord/ТГ">Да, Discord / ТГ 🎙️</option>
                        <option value="Только внутриигровой">Только внутри игры 🎧</option>
                        <option value="Без микрофона">Без микрофона 🚫</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editAboutInput">Описание стиля для этой игры</label>
                    <textarea id="editAboutInput" rows="3" placeholder="Расскажи про свой скилл, тайминги, позицию..."></textarea>
                </div>
            </div>

            <button class="btn-submit" style="margin-top: 20px;" onclick="saveProfileChanges()">Сохранить изменения</button>
        </div>

    </div>

    <div class="nav-bar" id="appNavBar">
        <button class="nav-item active" id="navFeedBtn" onclick="switchTab('feed')">
            <span class="nav-icon">🎴</span>
            <span>Поиск</span>
        </button>
        <button class="nav-item" id="navProfileBtn" onclick="switchTab('profile')">
            <span class="nav-icon">👤</span>
            <span>Мой Профиль</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const currentUser = tg.initDataUnsafe?.user || { id: 0, username: "test_gamer", first_name: "Игрок" };

        // Главный объект, где хранятся настройки пользователя по КАЖДОЙ игре по отдельности
        let myLocalData = {
            display_name: "",
            games_data: {
                "CS 2": { rank: "", voice: "Да, Discord/ТГ", about: "" },
                "Dota 2": { rank: "", voice: "Да, Discord/ТГ", about: "" },
                "Valorant": { rank: "", voice: "Да, Discord/ТГ", about: "" },
                "Apex Legends": { rank: "", voice: "Да, Discord/ТГ", about: "" }
            }
        };

        // Фейковая база данных других игроков для ленты
        let mockDatabase = [
            { id: 101, display_name: "S1mple_Fan", username: "cs_pro_player", game: "CS 2", rank: "Элита-Глобал", voice: "Да, Discord/ТГ", about: "Ищу жесткого плюс один в напарники на фейсит." },
            { id: 102, display_name: "Dendi_Fan", username: "mid_or_feed", game: "Dota 2", rank: "5300 MMR", voice: "Да, Discord/ТГ", about: "Ищу адекватного керри, чтобы выигрывать линию." },
            { id: 103, display_name: "Jett_Main", username: "val_reyna", game: "Valorant", rank: "Алмаз 3", voice: "Только внутриигровой", about: "Катаю по фану после работы без криков и тильта." },
            { id: 104, display_name: "Apex_Wraith", username: "apex_legend_user", game: "Apex Legends", rank: "Платина", voice: "Без микрофона", about: "Даю отличные маркеры. Ищу пати для рейтинга." }
        ];

        let currentProfileIndex = 0;

        // Отслеживание смены игры на экране редактирования
        document.getElementById('editGameSelect').addEventListener('change', function() {
            loadGameDataToEditForm(this.value);
        });

        // Загрузка данных конкретной игры в форму редактирования
        function loadGameDataToEditForm(gameName) {
            const gameData = myLocalData.games_data[gameName];
            document.getElementById('editRankInput').value = gameData.rank;
            document.getElementById('editVoiceSelect').value = gameData.voice;
            document.getElementById('editAboutInput').value = gameData.about;
        }

        // ПЕРВАЯ РЕГИСТРАЦИЯ
        function submitRegistration() {
            const nick = document.getElementById('regNickname').value.trim();
            if(!nick) {
                tg.showAlert("Пожалуйста, введите свой никнейм!");
                return;
            }

            const chosenGame = document.getElementById('gameSelect').value;

            // Записываем глобальный ник
            myLocalData.display_name = nick;
            // Записываем данные первой заполненной игры
            myLocalData.games_data[chosenGame] = {
                rank: document.getElementById('rankInput').value || "Без ранга",
                voice: document.getElementById('voiceSelect').value,
                about: document.getElementById('aboutInput').value || "Го играть!"
            };

            // Синхронизируем значения с экраном редактирования профиля
            document.getElementById('editNickname').value = myLocalData.display_name;
            loadGameDataToEditForm(chosenGame);
            document.getElementById('editGameSelect').value = chosenGame;

            // Скрываем регистрацию, включаем ленту и нижнее меню
            document.getElementById('registrationScreen').classList.remove('active');
            document.getElementById('feedScreen').classList.add('active');
            document.getElementById('appNavBar').style.display = 'flex';
            document.getElementById('headerSubtitle').innerText = "Свайпай карточки игроков";

            renderCurrentProfile();
        }

        // СОХРАНЕНИЕ ИЗМЕНЕНИЙ В ПРОФИЛЕ
        function saveProfileChanges() {
            const newNick = document.getElementById('editNickname').value.trim();
            if(!newNick) {
                tg.showAlert("Никнейм не может быть пустым!");
                return;
            }

            const activeGame = document.getElementById('editGameSelect').value;

            // Обновляем ник и данные конкретной выбранной игры
            myLocalData.display_name = newNick;
            myLocalData.games_data[activeGame] = {
                rank: document.getElementById('editRankInput').value || "Без ранга",
                voice: document.getElementById('editVoiceSelect').value,
                about: document.getElementById('editAboutInput').value || "Го играть!"
            };

            tg.showAlert(`Профиль и данные для ${activeGame} успешно сохранены!`);
            
            // Возвращаем пользователя на экран ленты
            switchTab('feed');
        }

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК МЕНЮ
        function switchTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            if(tab === 'feed') {
                document.getElementById('feedScreen').classList.add('active');
                document.getElementById('navFeedBtn').classList.add('active');
                document.getElementById('headerSubtitle').innerText = "Свайпай карточки игроков";
            } else if(tab === 'profile') {
                document.getElementById('profileScreen').classList.add('active');
                document.getElementById('navProfileBtn').classList.add('active');
                document.getElementById('headerSubtitle').innerText = "Настройка профиля по играм";
                // Обновляем форму при заходе на вкладку
                loadGameDataToEditForm(document.getElementById('editGameSelect').value);
            }
        }

        // ОТОБРАЖЕНИЕ КАРТОЧЕК
        function renderCurrentProfile() {
            if (currentProfileIndex >= mockDatabase.length) {
                document.getElementById('playerCard').style.display = 'none';
                document.getElementById('actionButtons').style.display = 'none';
                document.getElementById('noProfiles').style.display = 'block';
                return;
            }

            const profile = mockDatabase[currentProfileIndex];
            
            document.getElementById('cardUsername').innerText = "@" + profile.username;
            document.getElementById('cardDisplayName').innerText = profile.display_name;
            document.getElementById('cardGame').innerText = profile.game;
            document.getElementById('cardRank').innerText = profile.rank;
            document.getElementById('cardVoice').innerText = profile.voice;
            document.getElementById('cardAbout').innerText = profile.about;
        }

        // ЛАЙК / ДИЗЛАЙК
        function handleSwipe(action) {
            const currentProfile = mockDatabase[currentProfileIndex];
            
            if (action === 'like') {
                tg.showAlert(`Вы лайкнули игрока ${currentProfile.display_name} (@${currentProfile.username}) в игре ${currentProfile.game}!`);
            }

            currentProfileIndex++;
            renderCurrentProfile();
        }
    </script>
</body>
</html>
